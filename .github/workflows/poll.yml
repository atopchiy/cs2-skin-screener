name: poll-and-publish

# Runs the screener on a schedule: poll prices -> store -> signals ->
# commit updated history back -> publish dashboard to GitHub Pages.

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes (UTC)
  workflow_dispatch: {}        # allow manual runs from the Actions tab

permissions:
  contents: write    # commit the updated DB back
  pages: write       # publish to Pages
  id-token: write    # required by deploy-pages

# Don't let a slow run overlap the next scheduled one.
concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CSFLOAT_API_KEY: ${{ secrets.CSFLOAT_API_KEY }}
        run: python run.py

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/   # tracks screener.db + alert_state.json if present; respects .gitignore
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update price history [skip ci]"
            git push
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
